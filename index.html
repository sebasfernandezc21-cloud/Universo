<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// BOTÓN
const btn = document.getElementById("btnMusica");
const musica = document.getElementById("musica");

btn.onclick = () => {
  musica.play();
  btn.style.display = "none";
};

// ESCENA
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d001a);

// CÁMARA
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
camera.position.z = 20;

// RENDER (más compatible)
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 🌌 ESTRELLAS (optimizado)
const estrellasGeometry = new THREE.BufferGeometry();
const estrellasCount = 4000;
const posiciones = new Float32Array(estrellasCount * 3);

for (let i = 0; i < estrellasCount * 3; i++) {
  posiciones[i] = (Math.random() - 0.5) * 500;
}

estrellasGeometry.setAttribute('position', new THREE.BufferAttribute(posiciones, 3));

const estrellasMaterial = new THREE.PointsMaterial({
  color: 0xc77dff,
  size: 1
});

const estrellas = new THREE.Points(estrellasGeometry, estrellasMaterial);
scene.add(estrellas);

// ⚪ CENTRO
const luz = new THREE.Mesh(
  new THREE.SphereGeometry(2, 32, 32),
  new THREE.MeshBasicMaterial({ color: 0xffffff })
);
scene.add(luz);

// 🪐 PLANETA
const planeta = new THREE.Mesh(
  new THREE.SphereGeometry(1, 32, 32),
  new THREE.MeshBasicMaterial({ color: 0x8a2be2, wireframe: true })
);
scene.add(planeta);

// 💬 TEXTOS
function crearTexto(texto, x, y, z) {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  ctx.font = "bold 40px Arial";
  ctx.fillStyle = "#fff";
  ctx.fillText(texto, 10, 40);

  const texture = new THREE.CanvasTexture(canvas);
  const material = new THREE.SpriteMaterial({ map: texture });
  const sprite = new THREE.Sprite(material);

  sprite.position.set(x, y, z);
  sprite.scale.set(5, 2, 1);

  scene.add(sprite);
}

const frases = ["Te amo Yare 💜","Mi niña","Hermosa","Linda","Mi amor 💜"];

for (let i = 0; i < 50; i++) {
  crearTexto(
    frases[Math.floor(Math.random() * frases.length)],
    (Math.random() - 0.5) * 100,
    (Math.random() - 0.5) * 100,
    (Math.random() - 0.5) * 100
  );
}

// CONTROLES
let isDragging = false;
let prev = { x: 0, y: 0 };

document.addEventListener("mousedown", () => isDragging = true);
document.addEventListener("mouseup", () => isDragging = false);

document.addEventListener("mousemove", (e) => {
  if (isDragging) {
    scene.rotation.y += (e.clientX - prev.x) * 0.005;
    scene.rotation.x += (e.clientY - prev.y) * 0.005;
  }
  prev = { x: e.clientX, y: e.clientY };
});

// TOUCH SIMPLE
document.addEventListener("touchmove", (e) => {
  let t = e.touches[0];
  scene.rotation.y += (t.clientX - prev.x) * 0.005;
  scene.rotation.x += (t.clientY - prev.y) * 0.005;
  prev = { x: t.clientX, y: t.clientY };
});

// ANIMACIÓN
function animate() {
  requestAnimationFrame(animate);

  estrellas.rotation.y += 0.0005;
  planeta.rotation.y += 0.01;

  let scale = 1 + Math.sin(Date.now() * 0.002) * 0.1;
  luz.scale.set(scale, scale, scale);

  renderer.render(scene, camera);
}

animate();
    </script>
