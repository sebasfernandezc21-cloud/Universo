<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
try {

if (!window.THREE) {
  document.body.innerHTML = "<h2 style='color:white;text-align:center'>Error cargando Three.js</h2>";
  throw "No carga Three.js";
}

// BOTÓN
const btn = document.getElementById("btnMusica");
const musica = document.getElementById("musica");

btn.onclick = () => {
  musica.play();
  btn.style.display = "none";
};

// ESCENA
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d001a);

// CÁMARA
const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 15;

// RENDER
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ESTRELLAS (ultra ligero)
const geometry = new THREE.BufferGeometry();
const vertices = [];

for (let i = 0; i < 2000; i++) {
  vertices.push(
    (Math.random() - 0.5) * 200,
    (Math.random() - 0.5) * 200,
    (Math.random() - 0.5) * 200
  );
}

geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));

const material = new THREE.PointsMaterial({ color: 0xc77dff, size: 1 });
const stars = new THREE.Points(geometry, material);

scene.add(stars);

// CENTRO
const luz = new THREE.Mesh(
  new THREE.SphereGeometry(1.5, 16, 16),
  new THREE.MeshBasicMaterial({ color: 0xffffff })
);

scene.add(luz);

// ANIMACIÓN
function animate() {
  requestAnimationFrame(animate);

  stars.rotation.y += 0.001;

  let scale = 1 + Math.sin(Date.now() * 0.002) * 0.1;
  luz.scale.set(scale, scale, scale);

  renderer.render(scene, camera);
}

animate();

} catch (e) {
  document.body.innerHTML = "<h2 style='color:white;text-align:center'>Tu celular no soporta esta animación 😢</h2>";
  console.error(e);
}
</script>
