<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// BOTÓN MÚSICA
const btn = document.getElementById("btnMusica");
const musica = document.getElementById("musica");

btn.addEventListener("click", () => {
  musica.play();
  btn.style.display = "none";
});

// ESCENA
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d001a);

// CÁMARA
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
camera.position.z = 20;

// RENDER
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 🌌 ESTRELLAS (warp)
const estrellasGeometry = new THREE.BufferGeometry();
const estrellasCount = 8000;
const posiciones = [];

for (let i = 0; i < estrellasCount; i++) {
  posiciones.push((Math.random() - 0.5) * 800);
  posiciones.push((Math.random() - 0.5) * 800);
  posiciones.push((Math.random() - 0.5) * 800);
}

estrellasGeometry.setAttribute('position', new THREE.Float32BufferAttribute(posiciones, 3));

const estrellasMaterial = new THREE.PointsMaterial({
  color: 0xc77dff,
  size: 1.2
});

const estrellas = new THREE.Points(estrellasGeometry, estrellasMaterial);
scene.add(estrellas);

// ⚪ CENTRO CON PULSO
const luz = new THREE.Mesh(
  new THREE.SphereGeometry(2, 32, 32),
  new THREE.MeshBasicMaterial({ color: 0xffffff })
);
scene.add(luz);

// 🪐 PLANETA
const planeta = new THREE.Mesh(
  new THREE.SphereGeometry(1, 32, 32),
  new THREE.MeshBasicMaterial({ color: 0x8a2be2, wireframe: true })
);
scene.add(planeta);

// 💬 TEXTOS CON MOVIMIENTO
let textos = [];

function crearTexto(texto, x, y, z) {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  ctx.font = "bold 60px Arial";
  ctx.fillStyle = "#fff";
  ctx.shadowColor = "#c77dff";
  ctx.shadowBlur = 20;
  ctx.fillText(texto, 20, 60);

  const texture = new THREE.CanvasTexture(canvas);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture }));

  sprite.position.set(x, y, z);
  sprite.scale.set(6, 2.5, 1);

  sprite.userData = {
    speedX: (Math.random() - 0.5) * 0.02,
    speedY: (Math.random() - 0.5) * 0.02
  };

  textos.push(sprite);
  scene.add(sprite);
}

// FRASES
const frases = [
"Te amo Yare 💜","Mi niña","Preciosa","Hermosa","Linda",
"Bonita","Bella","Mi Yare hermosa 💜","Te amo mi amor",
"Mi princesa 👑","Mi todo ✨","Eres perfecta",
"Mi vida 💜","Mi cielo","Mi mundo","Mi corazón 💖",
"Mi razón de sonreír","Mi reina 👑","Mi dulce amor",
"Yare te amo demasiado 💜"
];

for (let i = 0; i < 120; i++) {
  let texto = frases[Math.floor(Math.random() * frases.length)];
  crearTexto(
    texto,
    (Math.random() - 0.5) * 150,
    (Math.random() - 0.5) * 150,
    (Math.random() - 0.5) * 150
  );
}

// 💜 CORAZONES AL TOCAR
function crearCorazon(x, y) {
  const div = document.createElement("div");
  div.innerHTML = "💜";
  div.style.position = "absolute";
  div.style.left = x + "px";
  div.style.top = y + "px";
  div.style.fontSize = "20px";
  div.style.pointerEvents = "none";

  document.body.appendChild(div);

  let i = 0;
  let anim = setInterval(() => {
    i++;
    div.style.top = (y - i * 2) + "px";
    div.style.opacity = 1 - i / 50;

    if (i > 50) {
      clearInterval(anim);
      div.remove();
    }
  }, 16);
}

document.addEventListener("click", (e) => {
  for (let i = 0; i < 10; i++) {
    crearCorazon(e.clientX, e.clientY);
  }
});

// 🎮 CONTROLES
let isDragging = false;
let previousMousePosition = { x: 0, y: 0 };
let initialDistance = null;

document.addEventListener("mousedown", () => isDragging = true);
document.addEventListener("mouseup", () => isDragging = false);

document.addEventListener("mousemove", (e) => {
  if (isDragging) {
    let deltaX = e.clientX - previousMousePosition.x;
    let deltaY = e.clientY - previousMousePosition.y;

    scene.rotation.y += deltaX * 0.005;
    scene.rotation.x += deltaY * 0.005;
  }
  previousMousePosition = { x: e.clientX, y: e.clientY };
});

document.addEventListener("touchstart", (e) => {
  isDragging = true;
  if (e.touches.length === 2) initialDistance = null;
});

document.addEventListener("touchmove", (e) => {

  if (e.touches.length === 2) {
    let dx = e.touches[0].clientX - e.touches[1].clientX;
    let dy = e.touches[0].clientY - e.touches[1].clientY;
    let distance = Math.sqrt(dx * dx + dy * dy);

    if (initialDistance !== null) {
      let diff = distance - initialDistance;
      camera.position.z -= diff * 0.05;
    }

    initialDistance = distance;
    return;
  }

  let touch = e.touches[0];

  let deltaX = touch.clientX - previousMousePosition.x;
  let deltaY = touch.clientY - previousMousePosition.y;

  scene.rotation.y += deltaX * 0.005;
  scene.rotation.x += deltaY * 0.005;

  previousMousePosition = { x: touch.clientX, y: touch.clientY };

});

document.addEventListener("touchend", () => {
  isDragging = false;
  initialDistance = null;
});

document.addEventListener("wheel", (e) => {
  camera.position.z += e.deltaY * 0.01;
});

// 🚀 ANIMACIÓN NIVEL DIOS
let t = 0;

function animate() {
  requestAnimationFrame(animate);

  t += 0.01;

  // 🌌 Warp estrellas
  estrellas.position.z += 0.5;
  if (estrellas.position.z > 200) estrellas.position.z = 0;

  // 💫 Centro late
  let scale = 1 + Math.sin(t * 2) * 0.2;
  luz.scale.set(scale, scale, scale);

  // 🪐 rotación
  planeta.rotation.y += 0.01;

  // 💬 textos flotando
  textos.forEach(txt => {
    txt.position.x += txt.userData.speedX;
    txt.position.y += txt.userData.speedY;
  });

  // 🎥 cámara automática suave
  camera.position.x = Math.sin(t * 0.3) * 2;
  camera.position.y = Math.cos(t * 0.3) * 2;

  camera.lookAt(scene.position);

  renderer.render(scene, camera);
}

animate();
</script>
